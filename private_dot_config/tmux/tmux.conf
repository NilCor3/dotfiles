# ── Prefix ────────────────────────────────────────────────────────────────────
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# ── Core settings ─────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g history-limit 20000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 0
set -g focus-events on
set -s set-clipboard on
set -g mouse on
set -g set-titles on
set -g set-titles-string "#{session_name}"

# Allow programs to bypass tmux and talk to WezTerm directly
set -g allow-passthrough on

# Pass through kitty keyboard protocol extended keys from WezTerm → tmux → Helix
set -g extended-keys on

# Inform tmux that the terminal supports RGB, Clipboard, and extended keys
set -as terminal-features ',xterm-256color:RGB:clipboard:extkeys'

# Pass scroll to app (e.g. Helix) when it handles mouse; otherwise use copy mode
bind -n WheelUpPane   if-shell -Ft= '#{mouse_any_flag}' 'send-keys -M' 'if -Ft= "#{pane_in_mode}" "send-keys -M" "copy-mode -e; send-keys -M"'
bind -n WheelDownPane if-shell -Ft= '#{mouse_any_flag}' 'send-keys -M' 'if -Ft= "#{pane_in_mode}" "send-keys -M" ""'

# ── Vi copy mode ───────────────────────────────────────────────────────────────
setw -g mode-keys vi
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y   send -X copy-pipe-and-cancel "pbcopy"

# ── Gruvbox theme ─────────────────────────────────────────────────────────────
set -g status-style                "bg=#3c3836,fg=#ebdbb2"
set -g status-left-length          50
set -g status-right-length         50
set -g status-left                 "#[bg=#458588,fg=#1d2021,bold] #S #[default]#{?client_prefix,#[bg=#d3869b]#[fg=#1d2021]#[bold] ^ #[default],}#{?#{==:#{client_key_table},resize},#[bg=#83a598]#[fg=#1d2021]#[bold] RESIZE #[default],}#{?#{==:#{client_key_table},move},#[bg=#fe8019]#[fg=#1d2021]#[bold] MOVE #[default],}#{?pane_in_mode,#[bg=#b16286]#[fg=#1d2021]#[bold] COPY #[default],} "
set -g status-right                "#[fg=#928374] %H:%M %d-%b "
set -g window-status-format        " #I:#W "
set -g window-status-current-format "#[bg=#d79921,fg=#1d2021,bold] #I:#W "
set -g window-status-separator     ""
set -g pane-border-style           "fg=#504945"
set -g pane-active-border-style    "fg=#d79921"
set -g pane-border-status          top
set -g pane-border-format          " #{?#{@user_title},#{@user_title},#{?#{==:#{pane_current_command},zsh},#{b:pane_current_path},#{pane_current_command}}} "
set -g message-style               "bg=#d79921,fg=#1d2021"
set -g mode-style                  "bg=#d79921,fg=#1d2021"
set -g display-panes-colour        "#928374"
set -g display-panes-active-colour "#d79921"

# ── Pane navigation ────────────────────────────────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind w select-pane -t :.+

# ── Splits ─────────────────────────────────────────────────────────────────────
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"
bind V split-window -h -f -c "#{pane_current_path}"
bind S split-window -v -f -c "#{pane_current_path}"

# ── Close ──────────────────────────────────────────────────────────────────────
bind q confirm-before -p "kill pane? (y/n)" kill-pane

# ── Zoom ───────────────────────────────────────────────────────────────────────
bind z resize-pane -Z

# ── Float scratchpad (display-popup) ──────────────────────────────────────────
bind F display-popup -E -w 80% -h 80% -b rounded -s "fg=#d79921" "$SHELL"

# ── Pane movement ──────────────────────────────────────────────────────────────
bind "{" swap-pane -U
bind "}" swap-pane -D
bind o rotate-window
bind Space next-layout
bind J display-popup -E -w 60% -h 50% -b rounded -s "fg=#d79921" "~/.config/tmux/scripts/move-pane.sh"

# Move mode (prefix + M): swap pane directionally, Esc to exit
unbind C-h
unbind C-j
unbind C-k
unbind C-l
bind C-h select-pane -L
bind C-j select-pane -D
bind C-k select-pane -U
bind C-l select-pane -R
bind M switch-client -T move
bind -T move h { swap-pane -t "{left-of}"  ; switch-client -T move }
bind -T move j { swap-pane -t "{down-of}"  ; switch-client -T move }
bind -T move k { swap-pane -t "{up-of}"    ; switch-client -T move }
bind -T move l { swap-pane -t "{right-of}" ; switch-client -T move }
bind -T move Escape switch-client -T root
bind -T move M switch-client -T root

# ── Pane marking and full-width join ───────────────────────────────────────────
bind m select-pane -m \; display "Pane marked (prefix M-j/k to join full-width)"
bind M-j run-shell "~/.config/tmux/scripts/join-marked.sh"
bind M-k run-shell "~/.config/tmux/scripts/join-marked.sh -b"

# ── Windows ────────────────────────────────────────────────────────────────────
bind n new-window -c "#{pane_current_path}"
bind x confirm-before -p "kill window? (y/n)" kill-window
bind ] next-window
bind [ previous-window
bind b break-pane

# ── Rename ─────────────────────────────────────────────────────────────────────
bind R command-prompt -I "#W" "rename-window '%%'"
bind P display-popup -E "~/.config/tmux/scripts/rename-pane.sh '#{pane_id}'"

# ── Window 1-9 ─────────────────────────────────────────────────────────────────
bind 1 select-window -t :1
bind 2 select-window -t :2
bind 3 select-window -t :3
bind 4 select-window -t :4
bind 5 select-window -t :5
bind 6 select-window -t :6
bind 7 select-window -t :7
bind 8 select-window -t :8
bind 9 select-window -t :9

# ── Resize mode ────────────────────────────────────────────────────────────────
bind r switch-client -T resize
bind -T resize h { resize-pane -L 3 ; switch-client -T resize }
bind -T resize j { resize-pane -D 3 ; switch-client -T resize }
bind -T resize k { resize-pane -U 3 ; switch-client -T resize }
bind -T resize l { resize-pane -R 3 ; switch-client -T resize }
bind -T resize H { resize-pane -L 10 ; switch-client -T resize }
bind -T resize J { resize-pane -D 10 ; switch-client -T resize }
bind -T resize K { resize-pane -U 10 ; switch-client -T resize }
bind -T resize L { resize-pane -R 10 ; switch-client -T resize }
bind -T resize = { select-layout even-horizontal ; switch-client -T resize }
bind -T resize Escape switch-client -T root
bind -T resize r switch-client -T root

# ── Help ───────────────────────────────────────────────────────────────────────
bind ? display-popup -E -w 134 -h 54 -b rounded -s "fg=#d79921" "~/.config/tmux/scripts/help.sh"

# ── Copy mode ──────────────────────────────────────────────────────────────────
bind e copy-mode

# ── Session manager ────────────────────────────────────────────────────────────
bind W display-popup -E -w 80% -h 80% -b rounded -s "fg=#d79921" "tmux choose-tree -Zs"

# ── Lazygit (project root) ────────────────────────────────────────────────────
bind g display-popup -E -d "#{pane_current_path}" -w 90% -h 90% -b rounded -s "fg=#d79921" "~/.config/tmux/scripts/lazygit.sh"

# ── AI commit (staged changes → ollama → commit/edit/cancel) ──────────────────
bind G display-popup -E -d "#{pane_current_path}" -w 70% -h 60% -b rounded -s "fg=#d79921" "~/.config/tmux/scripts/ai-commit.sh"

# ── pgcli (postgres interactive client) ────────────────────────────────────────
bind Q display-popup -E -w 80% -h 80% -b rounded -s "fg=#458588" "pgcli"

# ── Project picker ─────────────────────────────────────────────────────────────
bind p display-popup -E -w 60% -h 60% -b rounded -s "fg=#d79921" "~/.config/tmux/scripts/picker.sh"

# ── Detach ─────────────────────────────────────────────────────────────────────
bind d detach-client

# ── Reload config ──────────────────────────────────────────────────────────────
bind M-r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"
