# ── Prefix ────────────────────────────────────────────────────────────────────
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# ── Core settings ─────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g history-limit 20000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 0
set -g focus-events on
set -s set-clipboard on
set -g mouse on

# ── Vi copy mode ───────────────────────────────────────────────────────────────
setw -g mode-keys vi
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y   send -X copy-selection-and-cancel

# ── Gruvbox theme ─────────────────────────────────────────────────────────────
set -g status-style                "bg=#3c3836,fg=#ebdbb2"
set -g status-left-length          50
set -g status-right-length         50
set -g status-left                 "#[bg=#458588,fg=#1d2021,bold] #S #[default]#{?client_prefix,#[bg=#d3869b]#[fg=#1d2021]#[bold] ^ #[default],}#{?#{==:#{client_key_table},resize},#[bg=#83a598]#[fg=#1d2021]#[bold] RESIZE #[default],} "
set -g status-right                "#[fg=#928374] %H:%M %d-%b "
set -g window-status-format        " #I:#W "
set -g window-status-current-format "#[bg=#d79921,fg=#1d2021,bold] #I:#W "
set -g window-status-separator     ""
set -g pane-border-style           "fg=#504945"
set -g pane-active-border-style    "fg=#d79921"
set -g pane-border-status          top
set -g pane-border-format          " #{?pane_title,#{pane_title},#{pane_index}} "
set -g message-style               "bg=#d79921,fg=#1d2021"
set -g mode-style                  "bg=#d79921,fg=#1d2021"
set -g display-panes-colour        "#928374"
set -g display-panes-active-colour "#d79921"

# ── Pane navigation ────────────────────────────────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind w select-pane -t :.+

# ── Splits ─────────────────────────────────────────────────────────────────────
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"

# ── Close ──────────────────────────────────────────────────────────────────────
bind q confirm-before -p "kill pane? (y/n)" kill-pane

# ── Zoom ───────────────────────────────────────────────────────────────────────
bind z resize-pane -Z

# ── Float scratchpad (display-popup) ──────────────────────────────────────────
bind F display-popup -E -w 80% -h 80% -b rounded -s "fg=#d79921" "$SHELL"

# ── Windows ────────────────────────────────────────────────────────────────────
bind n new-window -c "#{pane_current_path}"
bind x confirm-before -p "kill window? (y/n)" kill-window
bind ] next-window
bind [ previous-window
bind b break-pane

# ── Rename ─────────────────────────────────────────────────────────────────────
bind R command-prompt -I "#W" "rename-window '%%'"
bind P command-prompt -I "#T" "select-pane -T '%%'"

# ── Window 1-9 ─────────────────────────────────────────────────────────────────
bind 1 select-window -t :1
bind 2 select-window -t :2
bind 3 select-window -t :3
bind 4 select-window -t :4
bind 5 select-window -t :5
bind 6 select-window -t :6
bind 7 select-window -t :7
bind 8 select-window -t :8
bind 9 select-window -t :9

# ── Resize mode ────────────────────────────────────────────────────────────────
bind r switch-client -T resize
bind -T resize h { resize-pane -L 3 ; switch-client -T resize }
bind -T resize j { resize-pane -D 3 ; switch-client -T resize }
bind -T resize k { resize-pane -U 3 ; switch-client -T resize }
bind -T resize l { resize-pane -R 3 ; switch-client -T resize }
bind -T resize H { resize-pane -L 10 ; switch-client -T resize }
bind -T resize J { resize-pane -D 10 ; switch-client -T resize }
bind -T resize K { resize-pane -U 10 ; switch-client -T resize }
bind -T resize L { resize-pane -R 10 ; switch-client -T resize }
bind -T resize = { select-layout even-horizontal ; switch-client -T resize }
bind -T resize Escape switch-client -T root
bind -T resize r switch-client -T root

# ── Help ───────────────────────────────────────────────────────────────────────
bind ? display-popup -E -w 70 -h 32 -b rounded -s "fg=#d79921" "~/.config/tmux/scripts/help.sh"

# ── Copy mode ──────────────────────────────────────────────────────────────────
bind e copy-mode

# ── Lazygit (project root) ────────────────────────────────────────────────────
bind g display-popup -E -w 90% -h 90% -b rounded -s "fg=#d79921" "zsh -i -c 'cd #{session_path} && lazygit'"

# ── Project picker ─────────────────────────────────────────────────────────────
bind p display-popup -E -w 60% -h 60% -b rounded -s "fg=#d79921" "~/.config/tmux/scripts/picker.sh"

# ── Detach ─────────────────────────────────────────────────────────────────────
bind d detach-client

# ── Reload config ──────────────────────────────────────────────────────────────
bind M-r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"
