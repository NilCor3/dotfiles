yq = "latest"
rust = { version = "stable", components = "rust-analyzer,rust-src" }
eza = "latest"
xh = "latest"
uv = "latest"
"npm:@stoplight/prism-cli" = "latest"
#"npm:json-server" = "latest"
air = "latest"
gotestsum = "latest"
"go:github.com/go-delve/delve/cmd/dlv" = "latest"
"go:github.com/aarzilli/gdlv" = "latest"
"cargo:bacon" = "latest"
"cargo:cargo-nextest" = "latest"
"cargo:cargo-audit" = "latest"
"cargo:cargo-expand" = "latest"
