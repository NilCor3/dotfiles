'npm:tldr' = 'latest'
'npm:@github/copilot-language-server' = 'latest'
'npm:httpyac' = 'latest'
python = "latest"
bat = 'latest'
glow = "latest"
hurl = 'latest'
lazygit = 'latest'
"go:github.com/jorgerojas26/lazysql" = { version = 'latest' }
