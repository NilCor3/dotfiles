theme = "gruvbox"

[editor]
inline-completion-timeout = 150
inline-completion-auto-trigger = false
bufferline = "multiple"
line-number = "relative"
cursorline = false
auto-format = true
end-of-line-diagnostics = "hint"
color-modes = true
mouse = true

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.indent-guides]
render = true

[editor.lsp]
display-inlay-hints = true

[editor.inline-diagnostics]
cursor-line = "warning" # show warnings and errors on the cursorline inline

[keys.normal]
esc = ["collapse_selection","keep_primary_selection"]
C-g = [":new", ":insert-output lazygit", ":buffer-close!", ":redraw"]
C-s = ":write"
"C-S-s" = ":wa"
"A-t" = ["goto_line_end", ":insert-output ~/.config/helix/scripts/hx-todo-insert.sh '%{buffer_name}'", "goto_line_end", "append_mode"]

[keys.normal.space.","]
b = ":sh ~/.config/helix/scripts/hx-blame.sh %{buffer_name} %{cursor_line}"
g = ":sh ~/.config/helix/scripts/hx-lazygit.sh"
t = ":sh ~/.config/helix/scripts/hx-gotest.sh %{buffer_name} %{cursor_line} cursor"
T = ":sh ~/.config/helix/scripts/hx-gotest.sh %{buffer_name} %{cursor_line} func"
F = ":sh ~/.config/helix/scripts/hx-gotest.sh %{buffer_name} %{cursor_line} file"
m = ":sh ~/.config/helix/scripts/hx-markdown.sh %{buffer_name}"

[keys.insert]
"A-;" = "collapse_selection"
"A-a" = "inline_completion_accept"
"A-r" = "inline_completion_dismiss"
"A-i" = "inline_completion_trigger"
"A-t" = ["normal_mode", "goto_line_end", ":insert-output ~/.config/helix/scripts/hx-todo-insert.sh '%{buffer_name}'", "goto_line_end", "append_mode"]
C-s = ["normal_mode", ":write"]
"C-S-s" = ["normal_mode", ":wa"]
