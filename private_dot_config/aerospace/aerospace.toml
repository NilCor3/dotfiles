config-version = 2

start-at-login = true

# Start JankyBorders with AeroSpace (focused window border highlight)
after-startup-command = [
    'exec-and-forget borders active_color=0xffd79921 inactive_color=0xff504945 width=4.0',
    # Workaround: workspace-to-monitor-force-assignment is broken in 0.20.3-Beta.
    # Seed the workspace-monitor binding by visiting one workspace on each monitor at startup.
    'focus-monitor 2',
    'workspace 6',
    'focus-monitor 1',
    'workspace 1',
]

# Mouse jumps to center of focused monitor when switching workspaces across monitors
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# Prevent macOS from hiding tiled windows
automatically-unhide-macos-hidden-apps = true

# Accordion: main pane grows, others stack on right
default-root-container-layout = 'accordion'
accordion-padding = 0

# Wide monitor → horizontal splits, tall monitor → vertical
default-root-container-orientation = 'auto'

# Workspaces always exist even when empty
persistent-workspaces = ['1', '2', '3', '4', '5', '6', '7', '8', '9']

[gaps]
inner.horizontal = 6
inner.vertical   = 6
outer.left       = 6
outer.right      = 6
outer.top        = 6
outer.bottom     = 6

# ── Monitor assignments ────────────────────────────────────────────────────────
# ⚠️  Run 'aerospace list-monitors' after first launch and replace the
#     placeholder strings below with your actual monitor names.
[workspace-to-monitor-force-assignment]
# P24h-2L (1) = main dev monitor, P24h-2L (2) = left browser monitor
# Parentheses must be regex-escaped (\() so they match literally
1 = 'P24h-2L \(1\)'
2 = 'P24h-2L \(1\)'
3 = 'P24h-2L \(1\)'
4 = 'P24h-2L \(1\)'
5 = 'P24h-2L \(1\)'
6 = 'P24h-2L \(2\)'
7 = 'P24h-2L \(2\)'
8 = 'P24h-2L \(2\)'
9 = 'Built-in Retina Display'

# ── Main keybindings (Hyper = Cmd+Ctrl+Alt+Shift via CapsLock) ────────────────
[mode.main.binding]
    # Disable accidental app hide
    cmd-h     = []
    cmd-alt-h = []

    # Focus windows — Hyper + hjkl (wraps around at workspace edge)
    "cmd-ctrl-alt-shift-h" = 'focus --boundaries workspace --boundaries-action wrap-around-the-workspace left'
    "cmd-ctrl-alt-shift-j" = 'focus --boundaries workspace --boundaries-action wrap-around-the-workspace down'
    "cmd-ctrl-alt-shift-k" = 'focus --boundaries workspace --boundaries-action wrap-around-the-workspace up'
    "cmd-ctrl-alt-shift-l" = 'focus --boundaries workspace --boundaries-action wrap-around-the-workspace right'

    # Move windows — Hyper + yuio (row above hjkl: same hand, one row up = move)
    "cmd-ctrl-alt-shift-y" = 'move left'
    "cmd-ctrl-alt-shift-u" = 'move down'
    "cmd-ctrl-alt-shift-i" = 'move up'
    "cmd-ctrl-alt-shift-o" = 'move right'

    # Switch workspace — Hyper + 1-9
    # Monitor IDs (from 'aerospace list-monitors'):
    #   1 = P24h-2L (2)          = main dev monitor
    #   2 = P24h-2L (1)          = left browser monitor
    #   3 = Built-in Retina      = laptop
    "cmd-ctrl-alt-shift-1" = ['focus-monitor 1', 'workspace 1']
    "cmd-ctrl-alt-shift-2" = ['focus-monitor 1', 'workspace 2']
    "cmd-ctrl-alt-shift-3" = ['focus-monitor 1', 'workspace 3']
    "cmd-ctrl-alt-shift-4" = ['focus-monitor 1', 'workspace 4']
    "cmd-ctrl-alt-shift-5" = ['focus-monitor 1', 'workspace 5']
    "cmd-ctrl-alt-shift-6" = ['focus-monitor 2', 'workspace 6']
    "cmd-ctrl-alt-shift-7" = ['focus-monitor 2', 'workspace 7']
    "cmd-ctrl-alt-shift-8" = ['focus-monitor 2', 'workspace 8']
    "cmd-ctrl-alt-shift-9" = ['focus-monitor 3', 'workspace 9']

    # Move window to workspace — Cmd+Ctrl+Alt + 1-9
    "cmd-ctrl-alt-1" = 'move-node-to-workspace 1'
    "cmd-ctrl-alt-2" = 'move-node-to-workspace 2'
    "cmd-ctrl-alt-3" = 'move-node-to-workspace 3'
    "cmd-ctrl-alt-4" = 'move-node-to-workspace 4'
    "cmd-ctrl-alt-5" = 'move-node-to-workspace 5'
    "cmd-ctrl-alt-6" = 'move-node-to-workspace 6'
    "cmd-ctrl-alt-7" = 'move-node-to-workspace 7'
    "cmd-ctrl-alt-8" = 'move-node-to-workspace 8'
    "cmd-ctrl-alt-9" = 'move-node-to-workspace 9'

    # Toggle float / tile
    "cmd-ctrl-alt-shift-space" = 'layout floating tiling'

    # Toggle layout: accordion ↔ horizontal tiles (Hyper+,)
    "cmd-ctrl-alt-shift-comma" = 'layout h_accordion h_tiles'

    # Nested container: join focused window + right neighbor into a vertical sub-container (Hyper+v)
    # Usage: with A|B|C tiled, focus B → hyper-v → creates A | [B/C] stacked vertically
    "cmd-ctrl-alt-shift-v" = ['join-with right', 'layout v_tiles']

    # Flatten all nested containers back to a single level (Hyper+f)
    "cmd-ctrl-alt-shift-f" = 'flatten-workspace-tree'

    # Balance all tiled window sizes equally (Hyper+b)
    "cmd-ctrl-alt-shift-b" = 'balance-sizes'

    # Switch to previous workspace (Hyper+Tab)
    "cmd-ctrl-alt-shift-tab" = 'workspace-back-and-forth'

    # Resize mode
    "cmd-ctrl-alt-shift-r" = 'mode resize'

    # Reload config
    "cmd-ctrl-alt-shift-c" = 'reload-config'

# ── Resize mode ───────────────────────────────────────────────────────────────
[mode.resize.binding]
    h     = 'resize width -50'
    l     = 'resize width +50'
    j     = 'resize height +50'
    k     = 'resize height -50'
    enter = 'mode main'
    esc   = 'mode main'

# ── App → Workspace assignments ───────────────────────────────────────────────

[[on-window-detected]]
if.app-id = 'com.github.wez.wezterm'
run = 'move-node-to-workspace 1'

# Testing browsers → workspace 2
[[on-window-detected]]
if.app-id = 'com.google.Chrome'
run = 'move-node-to-workspace 2'

[[on-window-detected]]
if.app-id = 'org.mozilla.firefox'
run = 'move-node-to-workspace 2'

[[on-window-detected]]
if.app-id = 'com.apple.Safari'
run = 'move-node-to-workspace 2'

# IntelliJ IDEA (both Ultimate and CE)
# ⚠️  Run 'aerospace list-apps' to confirm your exact bundle ID
[[on-window-detected]]
if.app-id = 'com.jetbrains.intellij'
run = 'move-node-to-workspace 3'

[[on-window-detected]]
if.app-id = 'com.jetbrains.intellij.ce'
run = 'move-node-to-workspace 3'

# Zen Browser → workspace 6 (primary browsing on right monitor)
# For testing, use Cmd+Ctrl+Alt-2 to move it to workspace 2
[[on-window-detected]]
if.app-id = 'app.zen-browser.zen'
run = 'move-node-to-workspace 6'

# Chat & media → workspace 9 (laptop screen)
[[on-window-detected]]
if.app-id = 'com.tinyspeck.slackmacgap'
run = 'move-node-to-workspace 9'

[[on-window-detected]]
if.app-id = 'net.whatsapp.WhatsApp'
run = 'move-node-to-workspace 9'

[[on-window-detected]]
if.app-id = 'com.hnc.Discord'
run = 'move-node-to-workspace 9'

[[on-window-detected]]
if.app-id = 'com.spotify.client'
run = 'move-node-to-workspace 9'

# Colony game (winit/wgpu — matched by window title) → float
[[on-window-detected]]
if.window-title-regex-substring = 'Colony'
run = 'layout floating'

# Catch-all: float all unrecognised apps so they stay on the current workspace.
# Dialogs, preference panes, and one-off utilities appear where you are.
# Named apps above this rule are tiled and routed to their workspace.
[[on-window-detected]]
run = 'layout floating'
