# Amethyst configuration
# https://github.com/ianyh/Amethyst/blob/development/docs/configuration-files.md

# Layout cycle order: tall (master+stack) → fullscreen → wide (horizontal master+stack)
layouts:
  - tall
  - fullscreen
  - wide

# Gaps between windows (px)
window-margin-size: 6
smart-window-margins: false

# Auto-float small popups (< 500px)
float-small-windows: true
small-window-size: 500

mouse-follows-focus: true
focus-follows-mouse: false
mouse-resizes-windows: true

# Invert the floating list into a tiling allowlist.
# When true: apps in the `floating` list are TILED; everything else floats.
floating-is-blacklist: true

# Apps that should be TILED (all other windows float by default)
floating:
  # Primary productivity
  - com.github.wez.wezterm
  - app.zen-browser.zen
  - com.google.Chrome
  - com.microsoft.VSCode

  # Communication
  - net.whatsapp.WhatsApp
  - com.tinyspeck.slackmacgap
  - com.hnc.Discord

  # Media & utilities
  - com.spotify.client
  - com.docker.docker
  - com.bitwarden.desktop
  - app.seashore

  # Uncomment to tile additional apps:
  # - com.apple.finder
  # - com.tableplus.tableplus
  # - com.googlecode.iterm2
